{% extends "home.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen bg-gray-100 text-center p-6">
  <h1 class="text-6xl font-bold text-red-500">404</h1>
  <h2 class="text-2xl font-semibold mt-4">Oops! Page not found.</h2>
  <p class="text-gray-600 mt-2 mb-6">
    The page you are looking for might have been removed or is temporarily unavailable.
  </p>
  <a href="{% url 'home' %}" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
    Go Back Home
  </a>
</div>
{% endblock %}
