{% extends "home.html" %}
{% block content %}
<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-4">{{ file.topic }}</h1>
  <p class="text-gray-700 mb-2"><strong>Field:</strong> {{ file.field }}</p>
  <p class="text-gray-700 mb-2"><strong>Researcher:</strong> {{ file.researcher|default:"Unknown" }}</p>
  <p class="text-gray-700 mb-4"><strong>Uploaded on:</strong> {{ file.date_uploaded }}</p>

  {% if file.file %}
  <a
    href="{% url 'read' file.id %}"
    class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
    target="_blank"
  >
    Read / Download File
  </a>
  {% else %}
  <p class="text-red-600">File not available yet.</p>
  {% endif %}
</div>
{% endblock %}
